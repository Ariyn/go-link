name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binary
        run: |
          mkdir -p dist
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} go build -trimpath -ldflags="-s -w" -o dist/personal-go-link_${{ matrix.goos }}_${{ matrix.goarch }} .

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: personal-go-link_${{ matrix.goos }}_${{ matrix.goarch }}
          path: dist/personal-go-link_${{ matrix.goos }}_${{ matrix.goarch }}

  release:
    needs: build-release
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Package extension
        run: |
          zip -r dist/go-link-extension.zip extension \
            -x "**/.DS_Store" \
            -x "**/Thumbs.db"

      - name: Generate checksums
        run: |
          cd dist
          sha256sum personal-go-link_* > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/personal-go-link_*
            dist/go-link-extension.zip
            dist/checksums.txt
